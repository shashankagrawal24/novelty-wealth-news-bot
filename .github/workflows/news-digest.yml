name: Novelty Wealth News Digest

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: data/seen.json
          key: seen-${{ github.run_id }}
          restore-keys: |
            seen-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Send digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          MIN_RELEVANCE_SCORE: ${{ vars.MIN_RELEVANCE_SCORE || '45' }}
          MAX_ITEMS_PER_RUN: ${{ vars.MAX_ITEMS_PER_RUN || '8' }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '36' }}
          DRY_RUN: "false"
        run: python -m src.main
